{% extends "base.html" %}

<link rel="stylesheet" href="{{ url_for('static', filename='product_page.css') }}">

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='product_page.css') }}">

<div class="product-fixed-nav shadow-sm">
    <div class="container d-flex justify-content-between align-items-center h-100">
        <div class="nav-left-section">
            <div class="product-title-small">{{ product.name|default('상품명을 불러오는 중...') }}</div>
            <div class="nav-hyperlinks">
                <a href="#section-images" class="me-2">이미지</a>
                <a href="#section-details">상세정보</a>
            </div>
        </div>

        <div class="nav-right-section d-flex align-items-center">
            <div class="price-info me-3 text-end">
                <div class="price-label">최종 혜택가</div>
                <div class="price-value text-primary fw-bold">
                    <span id="display-final-price">{{ "{:,}".format(product.price|default(0)) }}</span>원
                </div>
            </div>
            <button class="btn btn-primary rounded-pill px-4">구매하기</button>
        </div>
    </div>
</div>

<div class="product-content-wrapper" style="margin-top: 60px;">
    <section id="section-images" style="height: 500px; background: #eee;">슬라이더 영역 예정</section>
    <section id="section-details" style="height: 500px; background: #ddd;">상세 설명 영역 예정</section>
</div>
{% endblock %}
