{% extends "base.html" %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center text-center my-5 py-5" style="min-height: 60vh;">

    <img src="{{ url_for('static', filename='images/preparing.jpg') }}"
         alt="페이지 준비 중"
         class="img-fluid mb-5"
         style="max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);">

    <h2 class="fw-bold mb-3" style="letter-spacing: -1px;">
        현재 <span style="color: #007bff;">이 페이지는 준비중</span> 입니다.
    </h2>

    <p class="text-muted fs-5 mb-4">
        이용에 불편을 드려 죄송합니다.<br>
        빠른 시일 내에 준비하여 찾아뵙겠습니다.
    </p>

    <a href="/" class="btn btn-primary px-5 py-2 fw-bold shadow-sm" style="border-radius: 8px;">
        메인으로 돌아가기
    </a>

</div>
{% endblock %}
