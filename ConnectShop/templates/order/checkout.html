{% extends 'base.html' %}
{% block content %}
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='order.css') }}">

<div class="checkout-wrapper">
    <div class="checkout-form-section">
        <form id="order-form" method="POST" action="{{ url_for('order.place_order') }}">
            <div class="form-section">
                <h2 class="section-title">배송 정보</h2>
                <div class="input-row">
                    <div>
                        <div class="field-label">수령인</div>
                        <input type="text" name="recipient" class="form-control" placeholder="이름" required>
                    </div>
                    <div>
                        <div class="field-label">연락처</div>
                        <input type="text"
                               name="phone"
                               id="phone"  class="form-control"
                               placeholder="010-0000-0000"
                               maxlength="13"
                               oninput="formatPhoneNumber(this)"  required>
                    </div>
                </div>
                <div style="margin-top: 15px;">
                    <div class="field-label">배송 주소</div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="text" id="postcode" name="postcode" class="form-control" style="flex: 1;" placeholder="우편번호" readonly>
                        <button type="button" onclick="execDaumPostcode()" style="padding: 0 20px; border-radius: 12px; border: 1px solid #d2d2d7; background: white; cursor: pointer;">우편번호 찾기</button>
                    </div>
                    <input type="text" id="address" name="address" class="form-control" placeholder="기본 주소" readonly required>
                    <input type="text" id="address_detail" name="address_detail" class="form-control" style="margin-top:10px;" placeholder="상세 주소 (아파트, 동, 호수 등)">
                </div>
            </div>

            <div class="form-section">
                <h2 class="section-title">결제 방식</h2>

                <label class="payment-option">
                    <input type="radio" name="payment_method" value="신용카드/체크카드" checked onclick="togglePaymentFields('card')">
                    <div class="option-content">
                        <strong>신용카드 / 체크카드</strong>
                        <span>모든 카드사 이용 가능</span>
                    </div>
                </label>

                <div id="card-info-fields" style="margin-top: 15px; padding: 20px; background: #f5f5f7; border-radius: 12px;">
                    <div class="field-label">카드 번호</div>
                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" oninput="formatCardNumber(this)">

                    <div class="input-row" style="margin-top: 15px;">
                        <div>
                            <div class="field-label">유효기간 (MM/YY)</div>
                            <input type="text" class="form-control" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
                        </div>
                        <div>
                            <div class="field-label">CVC</div>
                            <input type="password" class="form-control" placeholder="***" maxlength="3">
                        </div>
                    </div>
                </div>

                <label class="payment-option" style="margin-top: 10px;">
                    <input type="radio" name="payment_method" value="무통장입금" onclick="togglePaymentFields('transfer')">
                    <div class="option-content">
                        <strong>무통장 입금</strong>
                        <span>주문 후 24시간 이내 입금</span>
                    </div>
                </label>
            </div>
        </form>
    </div>

    <div class="checkout-summary-section">
        <h3 style="margin-bottom: 20px;">주문 요약</h3>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>상품 금액</span>
            <span>{{ "{:,}".format(total_price) }}원</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px; color: #06c167;">
            <span>배송비</span>
            <span>무료</span>
        </div>
        <hr style="border: 0; border-top: 1px solid #d2d2d7; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: 700; margin-bottom: 30px;">
            <span>총계</span>
            <span>{{ "{:,}".format(total_price) }}원</span>
        </div>

        <button type="submit" form="order-form" class="btn-submit">
            주문 완료하기
        </button>
    </div>
</div>

<script>
function execDaumPostcode() {
    new daum.Postcode({
        oncomplete: function(data) {
            var addr = '';

            if (data.userSelectedType === 'R') {
                addr = data.roadAddress;
            } else {
                addr = data.jibunAddress;
            }

            document.getElementById('postcode').value = data.zonecode;
            document.getElementById("address").value = addr;
            document.getElementById("address_detail").focus();
        }
    }).open();
}

function formatPhoneNumber(target) {
let val = target.value.replace(/\D/g, "");

if (val.length > 11) {
    val = val.substring(0, 11);
}

let len = val.length;
let res = "";
if (len <= 3) res = val;
else if (len <= 7) res = val.substr(0, 3) + "-" + val.substr(3);
else res = val.substr(0, 3) + "-" + val.substr(3, 4) + "-" + val.substr(7, 4);

target.value = res;
}

function togglePaymentFields(method) {
    const cardFields = document.getElementById('card-info-fields');
    if (method === 'card') {
        cardFields.style.display = 'block';
    } else {
        cardFields.style.display = 'none';
    }
}

function formatCardNumber(target) {
    let val = target.value.replace(/\D/g, '');
    let res = val.match(/.{1,4}/g);
    target.value = res ? res.join(' ') : val;
}

function formatExpiry(target) {
    let val = target.value.replace(/\D/g, '');
    if (val.length >= 2) {
        target.value = val.substring(0, 2) + '/' + val.substring(2, 4);
    } else {
        target.value = val;
    }
}
</script>

{% endblock %}
